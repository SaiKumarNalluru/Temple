<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login • Temple Services</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner container">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">🛕</div>
        <div class="brand-text">
          <div class="brand-title">Temple Services</div>
          <div class="brand-subtitle">Admin Portal</div>
        </div>
      </div>
      <nav class="nav">
        <a href="/index.html">Home</a>
      </nav>
      <div class="user-actions">
        <div id="currentUserInfo" class="current-user" aria-live="polite"></div>
        <button id="logoutBtn" class="btn btn-secondary" hidden>Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Admin Login</h2>
      <form id="adminLoginForm" class="form" autocomplete="off">
        <label>Email
          <input type="email" id="adminLoginEmail" placeholder="admin@temple.com" required />
        </label>
        <label>Password
          <input type="password" id="adminLoginPassword" placeholder="••••••••" minlength="6" required />
        </label>
        <button type="submit" class="btn btn-primary">Login</button>
        <div class="small muted">Default: admin@temple.com / admin123</div>
      </form>
    </section>
  </main>

  <footer class="app-footer">
    <div class="container">© <span id="yearSpan"></span> Temple Services</div>
  </footer>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const App = window.TempleApp;
      const form = document.getElementById('adminLoginForm');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('adminLoginEmail').value.trim().toLowerCase();
        const password = document.getElementById('adminLoginPassword').value;
        const users = App.getUsers();
        const admin = users.find(u => u.email.toLowerCase() === email && u.password === password && u.role === 'admin');
        if (!admin) return alert('Invalid admin credentials.');
        App.setCurrentUser(admin);
        window.location.href = '/admin-dashboard.html';
      });
    });
  </script>
</body>
</html>
