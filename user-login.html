<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Login • Temple Services</title>
  <link rel="stylesheet" href="./styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;700" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div class="header-inner container">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">🛕</div>
        <div class="brand-text">
          <div class="brand-title">Temple Services</div>
          <div class="brand-subtitle">Devotee Portal</div>
        </div>
      </div>
      <nav class="nav">
        <a href="/index.html">Home</a>
        <a href="/register.html">Create Account</a>
      </nav>
      <div class="user-actions">
        <div id="currentUserInfo" class="current-user" aria-live="polite"></div>
        <button id="logoutBtn" class="btn btn-secondary" hidden>Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Login</h2>
      <form id="userLoginForm" class="form" autocomplete="off">
        <label>Email
          <input type="email" id="userLoginEmail" placeholder="you@example.com" required />
        </label>
        <label>Password
          <input type="password" id="userLoginPassword" placeholder="••••••••" minlength="6" required />
        </label>
        <button type="submit" class="btn btn-primary">Login</button>
        <div class="small muted">No account? <a href="/register.html">Register</a></div>
      </form>
    </section>
  </main>

  <footer class="app-footer">
    <div class="container">© <span id="yearSpan"></span> Temple Services</div>
  </footer>

  <nav class="bottom-nav">
    <a href="/index.html"><span class="material-symbols-outlined">home</span><span class="small">Home</span></a>
    <a href="/temples.html" class="active"><span class="material-symbols-outlined">temple_hindu</span><span class="small">Temples</span></a>
  </nav>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const App = window.TempleApp;
      const form = document.getElementById('userLoginForm');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = document.getElementById('userLoginEmail').value.trim().toLowerCase();
        const password = document.getElementById('userLoginPassword').value;
        const users = App.getUsers();
        const user = users.find(u => u.email.toLowerCase() === email && u.password === password && u.role === 'user');
        if (!user) return alert('Invalid user credentials.');
        App.setCurrentUser(user);
        window.location.href = '/temples.html';
      });
    });
  </script>
</body>
</html>
